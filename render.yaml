services:
  - type: web
    name: state-of-nature-backend
    env: python
    buildCommand: pip install -r server/requirements.txt
    startCommand: gunicorn -w 1 -k uvicorn.workers.UvicornWorker --timeout 300 server.main:app
    envVars:
      - key: PORT
        value: 8001
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: state-of-nature-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: state-of-nature-db
    plan: free
